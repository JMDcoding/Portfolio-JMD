<!DOCTYPE html>
<html lang="fr" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jean-Marc DUSSAUD | Galerie des Certifications</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet" />
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ios: {
              border: 'rgba(255, 255, 255, 0.14)',
              borderFocus: 'rgba(255, 255, 255, 0.35)',
            }
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            space: ['Space Grotesk', 'sans-serif'],
            mono: ['Fira Code', 'monospace'],
          }
        }
      }
    }
  </script>
  
  <link rel="stylesheet" href="styles.css" />
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    /* Styling for iframe to blend in with the dark theme */
    .cert-container {
      height: 70vh;
      min-height: 500px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 0.75rem;
      background-color: rgba(0,0,0,0.5);
      overflow: hidden;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body class="bg-transparent text-slate-100 font-sans antialiased overflow-x-hidden relative">

  <div class="global-background-overlay absolute inset-0 z-0 pointer-events-none" aria-hidden="true"></div>

  <header class="fixed top-0 left-0 w-full z-50 card-dark border-b border-white/10">
    <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
      <a href="index.html#certs" class="flex items-center gap-3 group text-slate-300 hover:text-white transition-colors text-sm font-semibold tracking-wider uppercase">
        <i data-lucide="arrow-left" class="w-4 h-4"></i> Retour
      </a>
      <strong class="font-space font-bold text-sm tracking-tight text-white hidden md:block">Galerie des Certifications</strong>
    </div>
  </header>

  <main class="w-full relative z-10 pt-24 pb-12 px-6 md:px-12 min-h-screen">
    <div class="max-w-4xl mx-auto">
      <div class="mb-10 text-center">
        <span class="text-xs font-mono font-bold tracking-widest text-slate-300 uppercase card-dark border border-white/15 px-4 py-1.5 rounded-full inline-block mb-3">
          Certifications Validées
        </span>
        <h1 class="font-space font-bold text-3xl md:text-4xl text-white">Consulter les Certificats</h1>
      </div>

      <!-- Cisco CCNA -->
      <section id="cisco-ccna" class="mb-16 scroll-mt-24">
        <div class="flex items-center gap-3 mb-4">
          <img src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/cisco.svg" class="w-6 h-6 invert opacity-80" alt="Cisco" />
          <h2 class="font-space font-bold text-2xl text-white">Cisco CCNA</h2>
        </div>
        <div class="cert-container flex items-center justify-center relative">
          <!-- The PDF viewer -->
          <object data="certification/cisco_ccna.pdf" type="application/pdf" width="100%" height="100%" class="absolute inset-0 z-10" onerror="this.style.display='none'; document.getElementById('cisco-fallback').style.display='flex';">
            <p class="hidden">Le PDF n'est pas supporté par votre navigateur.</p>
          </object>
          <!-- Fallback if PDF fails to load -->
          <div id="cisco-fallback" class="absolute inset-0 z-0 flex flex-col items-center justify-center p-6 text-center">
            <i data-lucide="file-warning" class="w-12 h-12 text-slate-500 mb-3"></i>
            <p class="text-slate-400 text-sm">Le PDF de cette certification n'a pas encore été ajouté.</p>
          </div>
        </div>
      </section>

      <!-- Fortinet NSE 4 -->
      <section id="fortinet-nse4" class="mb-16 scroll-mt-24">
        <div class="flex items-center gap-3 mb-4">
          <img src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/fortinet.svg" class="w-6 h-6 invert opacity-80" alt="Fortinet" />
          <h2 class="font-space font-bold text-2xl text-white">Fortinet NSE 4</h2>
        </div>
        <div class="cert-container flex items-center justify-center relative">
          <object data="certification/fortinet_nse4.pdf" type="application/pdf" width="100%" height="100%" class="absolute inset-0 z-10" onerror="this.style.display='none'; document.getElementById('fortinet-fallback').style.display='flex';">
            <p class="hidden">Le PDF n'est pas supporté par votre navigateur.</p>
          </object>
          <div id="fortinet-fallback" class="absolute inset-0 z-0 flex flex-col items-center justify-center p-6 text-center">
            <i data-lucide="file-warning" class="w-12 h-12 text-slate-500 mb-3"></i>
            <p class="text-slate-400 text-sm">Le PDF de cette certification n'a pas encore été ajouté.</p>
          </div>
        </div>
      </section>

    </div>
  </main>

  <script>
    lucide.createIcons();

    // Check if objects loaded successfully, if not show fallback (for browsers that don't trigger onerror on object)
    window.addEventListener('load', () => {
      document.querySelectorAll('object').forEach(obj => {
        // Sometimes object data loading failures don't fire onerror.
        // We handle it visually with z-index: the fallback is behind the object.
        // If the object has no content, it's transparent, and the fallback shows.
      });
    });
  </script>
</body>
</html>
